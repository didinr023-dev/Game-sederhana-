<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tebak Angka 🎯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', sans-serif;
            padding: 20px;
            color: #fff;
        }

        .game-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px 30px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.1);
            text-align: center;
            transition: all 0.3s ease;
        }

        .game-icon {
            font-size: 4rem;
            margin-bottom: 10px;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(to right, #ff9a9e, #fad0c4, #fad0c4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #b0b0d0;
            margin-bottom: 24px;
            font-size: 0.95rem;
        }

        .range-info {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 10px 20px;
            display: inline-block;
            margin-bottom: 24px;
            font-weight: 600;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.2);
            font-size: 0.9rem;
        }

        .attempts-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        .attempt-stat {
            background: rgba(0,0,0,0.3);
            border-radius: 14px;
            padding: 12px 18px;
            min-width: 70px;
        }
        .attempt-stat .label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #aaa;
        }
        .attempt-stat .value {
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffd166;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        input {
            flex: 1;
            padding: 16px 20px;
            border-radius: 20px;
            border: 2px solid rgba(255,255,255,0.25);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            outline: none;
            transition: 0.2s;
            text-align: center;
        }

        input:focus {
            border-color: #ff9a9e;
            box-shadow: 0 0 20px rgba(255,154,158,0.3);
            background: rgba(255,255,255,0.15);
        }

        button {
            padding: 16px 24px;
            border-radius: 20px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            background: #ff6b6b;
            color: white;
            letter-spacing: 0.5px;
            transition: all 0.25s;
            box-shadow: 0 8px 20px rgba(255,107,107,0.3);
            white-space: nowrap;
        }

        button:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 12px 28px rgba(255,107,107,0.5);
        }

        button:active {
            transform: translateY(0);
        }

        .secondary-btn {
            background: rgba(255,255,255,0.15);
            color: #ddd;
            box-shadow: none;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 12px 20px;
            font-size: 0.9rem;
        }
        .secondary-btn:hover {
            background: rgba(255,255,255,0.25);
            box-shadow: 0 6px 18px rgba(0,0,0,0.3);
        }

        .message {
            margin: 18px 0 8px;
            font-weight: 600;
            font-size: 1.1rem;
            min-height: 28px;
            color: #ffd166;
            transition: 0.2s;
        }

        .message.success {
            color: #6bff8e;
            font-size: 1.3rem;
        }
        .message.low {
            color: #ff9f9f;
        }
        .message.high {
            color: #ffb86c;
        }

        .history {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-top: 12px;
            max-height: 80px;
            overflow-y: auto;
        }
        .history span {
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
            padding: 5px 12px;
            font-size: 0.85rem;
            font-weight: 500;
            color: #ccc;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 400px) {
            .game-container {
                padding: 30px 18px;
            }
            h1 {
                font-size: 2rem;
            }
            .input-area {
                flex-direction: column;
            }
            button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="game-icon">🎯</div>
        <h1>Tebak Angka</h1>
        <p class="subtitle">Aku menyimpan angka rahasia. Coba tebak!</p>
        <div class="range-info">🔢 Angka antara <strong>1</strong> sampai <strong>100</strong></div>

        <div class="attempts-box">
            <div class="attempt-stat">
                <div class="label">Percobaan</div>
                <div class="value" id="attemptCount">0</div>
            </div>
            <div class="attempt-stat">
                <div class="label">Rekor Terbaik</div>
                <div class="value" id="bestScore">-</div>
            </div>
        </div>

        <div class="input-area" id="gameInputArea">
            <input type="number" id="guessInput" placeholder="Masukkan angka..." min="1" max="100" autofocus>
            <button id="guessBtn">Tebak 🔍</button>
        </div>

        <div class="message" id="message"></div>
        <div class="history" id="history"></div>

        <button id="resetBtn" class="secondary-btn hidden">🔄 Main Lagi</button>
    </div>

    <script>
        // Variabel game
        let secretNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;
        let bestScore = localStorage.getItem('bestScoreTebakAngka') ? parseInt(localStorage.getItem('bestScoreTebakAngka')) : null;
        let gameOver = false;
        let guessHistory = [];

        // Elemen DOM
        const guessInput = document.getElementById('guessInput');
        const guessBtn = document.getElementById('guessBtn');
        const messageEl = document.getElementById('message');
        const attemptCountEl = document.getElementById('attemptCount');
        const bestScoreEl = document.getElementById('bestScore');
        const historyEl = document.getElementById('history');
        const resetBtn = document.getElementById('resetBtn');
        const gameInputArea = document.getElementById('gameInputArea');

        // Tampilkan rekor terbaik jika ada
        if (bestScore !== null) {
            bestScoreEl.textContent = bestScore;
        }

        // Fungsi update tampilan
        function updateAttemptDisplay() {
            attemptCountEl.textContent = attempts;
        }

        function updateHistory(guess) {
            guessHistory.push(guess);
            historyEl.innerHTML = guessHistory.map(num => `<span>${num}</span>`).join('');
        }

        function setMessage(text, type) {
            messageEl.textContent = text;
            messageEl.className = 'message'; // reset class
            if (type) messageEl.classList.add(type);
        }

        function endGame(won = true) {
            gameOver = true;
            gameInputArea.classList.add('hidden');
            resetBtn.classList.remove('hidden');
            guessInput.disabled = true;
            guessBtn.disabled = true;
            if (won) {
                // Cek rekor
                if (bestScore === null || attempts < bestScore) {
                    bestScore = attempts;
                    localStorage.setItem('bestScoreTebakAngka', bestScore);
                    bestScoreEl.textContent = bestScore;
                    setMessage(`🎉 KEREN! Rekor baru: ${bestScore} percobaan!`, 'success');
                } else {
                    setMessage(`🎉 Benar! Angkanya ${secretNumber}. (${attempts} percobaan)`, 'success');
                }
            }
        }

        function resetGame() {
            secretNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            gameOver = false;
            guessHistory = [];
            updateAttemptDisplay();
            historyEl.innerHTML = '';
            setMessage('');
            guessInput.value = '';
            guessInput.disabled = false;
            guessBtn.disabled = false;
            gameInputArea.classList.remove('hidden');
            resetBtn.classList.add('hidden');
            guessInput.focus();
            // Refresh best score display
            bestScore = localStorage.getItem('bestScoreTebakAngka') ? parseInt(localStorage.getItem('bestScoreTebakAngka')) : null;
            bestScoreEl.textContent = bestScore !== null ? bestScore : '-';
        }

        function handleGuess() {
            if (gameOver) return;

            const guessStr = guessInput.value.trim();
            if (guessStr === '') {
                setMessage('Masukkan angka dulu, ya!', 'low');
                guessInput.focus();
                return;
            }
            const guess = Number(guessStr);
            if (isNaN(guess) || !Number.isInteger(guess) || guess < 1 || guess > 100) {
                setMessage('Harus angka 1 sampai 100!', 'low');
                guessInput.value = '';
                guessInput.focus();
                return;
            }

            // Cek apakah angka sudah pernah ditebak
            if (guessHistory.includes(guess)) {
                setMessage('Kamu sudah menebak angka ini. Coba yang lain!', 'high');
                guessInput.value = '';
                guessInput.focus();
                return;
            }

            // Proses tebakan
            attempts++;
            updateAttemptDisplay();
            updateHistory(guess);

            if (guess === secretNumber) {
                endGame(true);
            } else if (guess < secretNumber) {
                setMessage(`📈 ${guess} terlalu rendah! Naikkan lagi.`, 'low');
            } else {
                setMessage(`📉 ${guess} terlalu tinggi! Turunkan lagi.`, 'high');
            }

            guessInput.value = '';
            guessInput.focus();
        }

        // Event listeners
        guessBtn.addEventListener('click', handleGuess);
        guessInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                handleGuess();
            }
        });
        resetBtn.addEventListener('click', resetGame);

        // Fokus input saat halaman dimuat
        window.addEventListener('load', () => {
            guessInput.focus();
        });
    </script>
</body>
</html>
